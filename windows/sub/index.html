<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>子窗口</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      /* 自定义标题栏 — 可拖拽区域 */
      .title-bar {
        height: 32px;
        background: #2c3e50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px;
        -webkit-app-region: drag;        /* ← 核心：让这块区域可拖拽 */
        user-select: none;
      }
      .title-bar span {
        color: #ecf0f1;
        font-size: 13px;
      }
      .title-bar .btns {
        -webkit-app-region: no-drag;     /* ← 按钮区域不可拖拽 */
        display: flex;
        gap: 8px;
      }
      .title-bar button {
        background: none;
        border: none;
        color: #ecf0f1;
        font-size: 14px;
        cursor: pointer;
        padding: 2px 6px;
      }
      .title-bar button:hover { background: rgba(255,255,255,0.15); }
      .title-bar .btn-close:hover { background: #e74c3c; }

      /* 内容区域 */
      .content {
        padding: 16px;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- 自定义标题栏 -->
    <div class="title-bar">
      <span>子窗口</span>
      <div class="btns">
        <button id="min-btn" title="最小化">—</button>
        <button id="max-btn" title="最大化">□</button>
        <button id="close-btn" class="btn-close" title="关闭">✕</button>
      </div>
    </div>

    <!-- 原有内容 -->
    <div class="content">
      <p id="from-main"></p>
      <input id="msg-input" type="text" placeholder="输入发给主窗口的消息" />
      <button id="reply-btn">发回主窗口</button>
      <p id="reply-status"></p>
    </div>
  </body>
  <script src="./renderer.js"></script>
</html>
